# ══════════════════════════════════════════════════════════════
# LegalAgent 完整部署编排
#
# 服务架构:
#   postgres  ─── pgvector 向量数据库 + LangGraph checkpoint
#   vllm      ─── Qwen3.5-9B + LoRA 推理 (GPU)
#   agent-api ─── LangGraph Agent API (端口 8008)
#   ui        ─── Chat 前端 (端口 8009)
#
# 启动:
#   cd Docker
#   docker compose up -d                   # 启动全部（需 GPU）
#   docker compose up -d --scale vllm=0    # 不启动 vLLM（使用外部 LLM API）
#
# RAG 数据初始化（首次部署后执行）:
#   docker compose run --rm agent-api python RAG/load_store.py
# ══════════════════════════════════════════════════════════════

services:

  # ────────────────── PostgreSQL + pgvector ──────────────────
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: legal-postgres
    restart: unless-stopped
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-legal_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-legal_db}"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - legal-net

  # ────────────────── vLLM 推理服务 (GPU) ───────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: legal-vllm
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - ../LLM/qwen3.5-9b:/models/qwen3.5-9b:ro
      - ../LLM/qwen3.5-9b-lora:/models/qwen3.5-9b-lora:ro
    ports:
      - "8888:8888"
    ipc: host
    command: >
      --model /models/qwen3.5-9b
      --served-model-name qwen3.5-9b
      --host 0.0.0.0
      --port 8888
      --tensor-parallel-size ${VLLM_TP_SIZE:-1}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      --dtype ${VLLM_DTYPE:-bfloat16}
      --trust-remote-code
      --reasoning-parser qwen3
      --enable-prefix-caching
      --enable-chunked-prefill
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --language-model-only
      --quantization ${VLLM_QUANTIZATION:-bitsandbytes}
      --enable-lora
      --max-lora-rank 64
      --lora-modules {"name":"${VLLM_LORA_NAME:-legal-lora}","path":"/models/qwen3.5-9b-lora","base_model_name":"/models/qwen3.5-9b"}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - legal-net

  # ────────────────── Agent API ─────────────────────────────
  agent-api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: legal-agent-api
    restart: unless-stopped
    env_file: .env.docker
    environment:
      PG_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-legal_db}
      base_url: http://vllm:8888/v1
      api_key: ${api_key:-EMPTY}
      VLLM_LORA_NAME: ${VLLM_LORA_NAME:-legal-lora}
      GEN_MODEL: ${GEN_MODEL:-legal-lora}
    command: ["uvicorn", "Agent.api:app", "--host", "0.0.0.0", "--port", "8008"]
    ports:
      - "8008:8008"
    volumes:
      - ../Skills:/app/Skills:ro
      - ../RAG/chunks_json:/app/RAG/chunks_json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - legal-net

  # ────────────────── Chat UI ───────────────────────────────
  # agent_base_url 是浏览器端访问 agent-api 的地址（非容器内部地址）
  # 本机访问用 localhost；远程访问需改为宿主机 IP，如 http://192.168.1.100:8008/v1
  ui:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: legal-ui
    restart: unless-stopped
    env_file: .env.docker
    environment:
      agent_base_url: ${agent_base_url:-http://localhost:8008/v1}
    command: ["uvicorn", "UI.app:app", "--host", "0.0.0.0", "--port", "8009"]
    ports:
      - "8009:8009"
    depends_on:
      agent-api:
        condition: service_healthy
    networks:
      - legal-net

volumes:
  pgdata:
    driver: local

networks:
  legal-net:
    driver: bridge
